name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Bootstrap Gradle Wrapper
        shell: bash
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — bootstrapping..."
            curl -fsSL -o /tmp/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.13.0/gradle/wrapper/gradle-wrapper.jar"
            cp /tmp/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew 2>/dev/null || true

      - name: Validate JSON assets
        run: python3 scripts/validate_assets.py

      - name: Compile Kotlin (debug)
        run: ./gradlew compileDebugKotlin --stacktrace --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
